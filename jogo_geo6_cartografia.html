<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoAventura — Cartografia 6º Ano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1.5rem 1rem 3rem; }
  .container { max-width: 560px; width: 100%; }

  /* TELA INÍCIO */
  #tela-inicio { text-align: center; animation: fadeIn 0.5s ease; }
  .logo { font-size: 72px; margin-bottom: 12px; display: block; }
  .game-title { font-size: 26px; font-weight: 900; color: white; margin-bottom: 4px; }
  .game-disc { font-size: 13px; font-weight: 700; color: #6366f1; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .game-sub { font-size: 14px; color: #94a3b8; margin-bottom: 1.5rem; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .info-box { background: #1e293b; border-radius: 14px; padding: 14px 10px; text-align: center; }
  .info-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .info-label { font-size: 11px; color: #64748b; display: block; }
  .info-val { font-size: 14px; font-weight: 800; color: white; display: block; margin-top: 2px; }
  .form-wrap { background: #1e293b; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; text-align: left; }
  .form-lbl { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
  .form-inp { width: 100%; padding: 12px 14px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: white; outline: none; transition: border 0.2s; margin-bottom: 12px; }
  .form-inp::placeholder { color: #475569; }
  .form-inp:focus { border-color: #6366f1; }
  .form-select { width: 100%; padding: 12px 14px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: white; outline: none; transition: border 0.2s; appearance: none; cursor: pointer; }
  .form-select:focus { border-color: #6366f1; }
  .btn-start { width: 100%; padding: 16px; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: white; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 24px rgba(99,102,241,0.5); }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(99,102,241,0.6); }

  /* HUD */
  #hud { display: none; background: #1e293b; border-radius: 16px; padding: 12px 16px; margin-bottom: 1rem; }
  .hud-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .hud-fase { font-size: 13px; font-weight: 800; color: #94a3b8; }
  .hud-fase span { color: white; }
  .hud-pontos { font-size: 13px; font-weight: 800; color: #fbbf24; }
  .vidas { display: flex; gap: 5px; }
  .vida { font-size: 20px; transition: all 0.3s; }
  .vida.perdida { filter: grayscale(1); opacity: 0.25; transform: scale(0.8); }
  .progress-wrap { background: #0f172a; border-radius: 20px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 20px; transition: width 0.5s ease; }

  /* FASE */
  #tela-fase { display: none; }
  .fase-badge { display: inline-flex; align-items: center; gap: 6px; background: #1e293b; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 800; color: #a78bfa; margin-bottom: 14px; }
  .fase-num-badge { background: #6366f1; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; }
  .pergunta-card { background: #1e293b; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; border-top: 4px solid var(--cor); }
  .pergunta-emoji { font-size: 34px; display: block; margin-bottom: 10px; }
  .pergunta-texto { font-size: 16px; font-weight: 800; color: white; line-height: 1.5; }
  .opcoes { display: flex; flex-direction: column; gap: 10px; }
  .opcao { display: flex; align-items: flex-start; gap: 12px; padding: 13px 15px; background: #1e293b; border: 2px solid #334155; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
  .opcao:hover { border-color: #6366f1; transform: translateX(4px); }
  .opcao-letra { width: 30px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; background: #0f172a; color: #64748b; flex-shrink: 0; transition: all 0.2s; margin-top: 1px; }
  .opcao-texto { font-size: 14px; font-weight: 700; color: #cbd5e1; line-height: 1.4; }
  .opcao.correta { border-color: #4ade80 !important; background: #052e16 !important; pointer-events: none; }
  .opcao.correta .opcao-letra { background: #4ade80; color: #052e16; }
  .opcao.correta .opcao-texto { color: #4ade80; }
  .opcao.errada { border-color: #f87171 !important; background: #2d0a0a !important; pointer-events: none; }
  .opcao.errada .opcao-letra { background: #f87171; color: #2d0a0a; }
  .opcao.errada .opcao-texto { color: #f87171; }
  .opcao.bloqueada { pointer-events: none; opacity: 0.35; }
  .feedback { border-radius: 14px; padding: 14px 16px; margin-top: 10px; font-size: 14px; font-weight: 700; line-height: 1.5; display: none; animation: fadeIn 0.3s ease; }
  .feedback.ok { background: #052e16; color: #4ade80; border: 2px solid #166534; }
  .feedback.err { background: #2d0a0a; color: #f87171; border: 2px solid #991b1b; }
  .btn-prox { width: 100%; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: white; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s; margin-top: 12px; display: none; box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
  .btn-prox:hover { transform: translateY(-2px); }

  /* RESULTADO */
  #tela-resultado { display: none; animation: fadeIn 0.5s ease; text-align: center; }
  .res-emoji { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 0.8s ease; }
  .res-titulo { font-size: 26px; font-weight: 900; color: white; margin-bottom: 6px; }
  .res-sub { font-size: 14px; color: #94a3b8; margin-bottom: 1.5rem; }
  .res-card { background: #1e293b; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .stat-box { background: #0f172a; border-radius: 14px; padding: 14px; text-align: center; }
  .stat-val { font-size: 30px; font-weight: 900; color: white; display: block; }
  .stat-lbl { font-size: 12px; color: #64748b; display: block; margin-top: 2px; }
  .recap-titulo { font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; text-align: left; }
  .recap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .recap-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; }
  .recap-item.ok { background: #052e16; color: #4ade80; }
  .recap-item.err { background: #2d0a0a; color: #f87171; }
  .btn-jogar-de-novo { width: 100%; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: #94a3b8; background: #1e293b; border: 2px solid #334155; border-radius: 14px; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
  .btn-jogar-de-novo:hover { border-color: #6366f1; color: white; }
  .enviando-msg { font-size: 13px; color: #64748b; margin-top: 10px; text-align: center; }

  /* ANIMAÇÕES */
  @keyframes fadeIn { from{opacity:0}to{opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%,100%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(0.9)} }
  @keyframes shake { 0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)} }
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  .confetti-piece { position: fixed; top: -10px; pointer-events: none; animation: confettiFall linear forwards; }
</style>
</head>
<body>
<div class="container">

  <!-- TELA INÍCIO -->
  <div id="tela-inicio">
    <span class="logo">🗺️</span>
    <div class="game-disc">Geografia · 6º Ano</div>
    <div class="game-title">GeoAventura</div>
    <div class="game-sub">Cartografia: Elementos e Símbolos</div>
    <div class="info-grid">
      <div class="info-box"><span class="info-icon">🎯</span><span class="info-label">Fases</span><span class="info-val">10</span></div>
      <div class="info-box"><span class="info-icon">❤️</span><span class="info-label">Vidas</span><span class="info-val">5</span></div>
      <div class="info-box"><span class="info-icon">⭐</span><span class="info-label">Pontos</span><span class="info-val">até 1000</span></div>
    </div>
    <div class="form-wrap">
      <span class="form-lbl">👤 Seu nome completo</span>
      <input class="form-inp" id="nome" type="text" placeholder="Digite seu nome...">
      <span class="form-lbl">🏫 Sua turma</span>
      <select class="form-select" id="turma">
        <option value="">— Selecione sua turma —</option>
        <option value="6º Ano A">6º Ano A</option>
        <option value="6º Ano B">6º Ano B</option>
        <option value="6º Ano C">6º Ano C</option>
        <option value="6º Ano D">6º Ano D</option>
      </select>
    </div>
    <button class="btn-start" onclick="iniciar()">🚀 Começar o jogo!</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="hud-fase">Fase <span id="hud-fase-num">1</span>/10</div>
      <div class="hud-pontos">⭐ <span id="hud-pontos">0</span> pts</div>
      <div class="vidas" id="vidas-display">
        <span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- FASE -->
  <div id="tela-fase"></div>

  <!-- RESULTADO -->
  <div id="tela-resultado"></div>

</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyiCArjavmt278IUUFuk_QNt81qeqQU_hcDOeY2i3iX301gTBL7jEYV0NZjVFwDZYIPkQ/exec";

const FASES = [
  {
    cor: '#6366f1', emoji: '📐',
    pergunta: 'O que é Cartografia?',
    opcoes: [
      'A ciência que estuda o clima e as condições do tempo',
      'A ciência que se dedica à representação e comunicação de informação espacial por meio de mapas',
      'A arte de desenhar paisagens naturais em telas e papéis',
      'O estudo dos movimentos da Terra ao redor do Sol'
    ],
    correta: 1,
    explicacao: '✅ Isso mesmo! Cartografia é a ciência da representação espacial. Desde as civilizações mais antigas, os seres humanos usam mapas para registrar e compreender o espaço.'
  },
  {
    cor: '#ec4899', emoji: '✏️',
    pergunta: 'Qual é a diferença principal entre um croqui e um mapa?',
    opcoes: [
      'O croqui é feito no computador; o mapa é desenhado à mão',
      'O croqui representa apenas cidades; o mapa representa rios e montanhas',
      'O croqui é livre e aproximado; o mapa é elaborado com base em estudos científicos e convenções técnicas',
      'Não há diferença — croqui e mapa são a mesma coisa'
    ],
    correta: 2,
    explicacao: '✅ Correto! O croqui é um desenho rudimentar, feito sem rigor técnico. O mapa, por sua vez, exige estudos científicos, operações técnicas e convenções artísticas rigorosas.'
  },
  {
    cor: '#14b8a6', emoji: '🌍',
    pergunta: 'O que é um mapa?',
    opcoes: [
      'Uma fotografia aérea da superfície da Terra',
      'Um texto que descreve as características de uma região',
      'Uma representação gráfica das características naturais ou sociais da superfície da Terra sobre um suporte plano',
      'Um instrumento usado para medir distâncias reais no campo'
    ],
    correta: 2,
    explicacao: '✅ Exato! O mapa representa a superfície terrestre sobre qualquer suporte plano — papel, tecido, couro ou meios digitais.'
  },
  {
    cor: '#f97316', emoji: '🌿',
    pergunta: 'Qual das alternativas apresenta apenas características NATURAIS?',
    opcoes: [
      'Rios, montanhas e estradas federais',
      'Rios, montanhas, clima e vegetação',
      'Cidades, estradas e campos agrícolas',
      'Fauna, indústrias e áreas urbanas'
    ],
    correta: 1,
    explicacao: '✅ Correto! Características naturais — como rios, montanhas, clima e vegetação — existem independentemente da ação humana.'
  },
  {
    cor: '#8b5cf6', emoji: '📋',
    pergunta: 'Para que serve a LEGENDA em um mapa?',
    opcoes: [
      'Indica quem elaborou o mapa e a data de criação',
      'Mostra a relação entre o tamanho do mapa e as dimensões reais',
      'Mostra os símbolos e as cores empregados e seus respectivos significados',
      'Indica os pontos cardeais para orientação no espaço'
    ],
    correta: 2,
    explicacao: '✅ Muito bem! Sem legenda, não é possível interpretar corretamente as informações de um mapa. Ela é um elemento indispensável.'
  },
  {
    cor: '#3b82f6', emoji: '📏',
    pergunta: 'O que é a ESCALA de um mapa?',
    opcoes: [
      'O elemento que indica os pontos cardeais no mapa',
      'A relação entre as dimensões representadas no mapa e as dimensões reais',
      'O conjunto de símbolos que representa elementos da paisagem',
      'A data em que as informações do mapa foram coletadas'
    ],
    correta: 1,
    explicacao: '✅ Perfeito! A escala mostra quantas vezes a realidade foi reduzida para caber no mapa. Por exemplo, 1:1.000.000 significa que 1 cm no mapa equivale a 1.000.000 cm na realidade.'
  },
  {
    cor: '#f59e0b', emoji: '🧭',
    pergunta: 'Qual elemento do mapa indica os pontos cardeais — Norte, Sul, Leste e Oeste?',
    opcoes: [
      'Escala',
      'Legenda',
      'Fonte',
      'Rosa dos Ventos (Orientação)'
    ],
    correta: 3,
    explicacao: '✅ Isso mesmo! A Rosa dos Ventos ou orientação é o elemento que nos guia no espaço representado, indicando os pontos cardeais.'
  },
  {
    cor: '#10b981', emoji: '📌',
    pergunta: 'As coordenadas geográficas são determinadas por:',
    opcoes: [
      'Títulos e fontes cartográficas',
      'Escalas numéricas e gráficas',
      'Paralelos (latitude) e meridianos (longitude)',
      'Símbolos figurativos e convenções cartográficas'
    ],
    correta: 2,
    explicacao: '✅ Correto! Os paralelos indicam a latitude e os meridianos indicam a longitude. Juntos, permitem localizar qualquer ponto na superfície da Terra.'
  },
  {
    cor: '#e11d48', emoji: '🗾',
    pergunta: 'O que são símbolos cartográficos?',
    opcoes: [
      'Números que indicam a altitude de montanhas e rios',
      'Desenhos que representam elementos da paisagem no mapa, também chamados de convenções cartográficas',
      'Linhas imaginárias que dividem a Terra em hemisférios',
      'Tabelas que mostram dados populacionais de cada região'
    ],
    correta: 1,
    explicacao: '✅ Exato! Os símbolos cartográficos — ou convenções cartográficas — são representações visuais de elementos da paisagem. Um navio indica porto; uma torre indica petróleo, por exemplo.'
  },
  {
    cor: '#7c3aed', emoji: '🎨',
    pergunta: 'Quando as informações não podem ser representadas por símbolos figurativos, os cartógrafos utilizam:',
    opcoes: [
      'Fotografias e filmes documentários',
      'Apenas texto escrito descrevendo o elemento',
      'Cores e figuras geométricas, entre outros recursos',
      'Coordenadas numéricas e tabelas de dados'
    ],
    correta: 2,
    explicacao: '✅ Isso mesmo! Além dos símbolos figurativos, os mapas usam cores (para classificar regiões) e figuras geométricas (para indicar recursos minerais, por exemplo), combinando recursos para comunicar informações com clareza.'
  }
];

let nomeJogador = '';
let turmaJogador = '';
let faseAtual = 0;
let vidas = 5;
let pontos = 0;
let acertos = 0;
let historico = [];
let respondeu = false;

function iniciar() {
  nomeJogador = document.getElementById('nome').value.trim();
  turmaJogador = document.getElementById('turma').value;
  if (!nomeJogador) {
    document.getElementById('nome').style.borderColor = '#f87171';
    setTimeout(() => document.getElementById('nome').style.borderColor = '#334155', 1500);
    return;
  }
  if (!turmaJogador) {
    document.getElementById('turma').style.borderColor = '#f87171';
    setTimeout(() => document.getElementById('turma').style.borderColor = '#334155', 1500);
    return;
  }
  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  carregarFase();
}

function carregarFase() {
  respondeu = false;
  const fase = FASES[faseAtual];
  document.getElementById('hud-fase-num').textContent = faseAtual + 1;
  document.getElementById('hud-pontos').textContent = pontos;
  document.getElementById('progress-fill').style.width = (faseAtual / FASES.length * 100) + '%';
  atualizarVidas();

  const opcoesHTML = fase.opcoes.map((op, i) => `
    <div class="opcao" onclick="responder(${i})" id="op-${i}">
      <div class="opcao-letra">${['A','B','C','D'][i]}</div>
      <div class="opcao-texto">${op}</div>
    </div>
  `).join('');

  document.getElementById('tela-fase').style.display = 'block';
  document.getElementById('tela-fase').innerHTML = `
    <div style="animation:fadeUp 0.4s ease">
      <div class="fase-badge">
        <div class="fase-num-badge">${faseAtual + 1}</div>
        Fase ${faseAtual + 1} de ${FASES.length}
      </div>
      <div class="pergunta-card" style="--cor:${fase.cor}">
        <span class="pergunta-emoji">${fase.emoji}</span>
        <div class="pergunta-texto">${fase.pergunta}</div>
      </div>
      <div class="opcoes">${opcoesHTML}</div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-prox" id="btn-prox" onclick="proximaFase()">Próxima fase →</button>
    </div>
  `;
}

function responder(idx) {
  if (respondeu) return;
  respondeu = true;
  const fase = FASES[faseAtual];
  const acertou = idx === fase.correta;
  const fb = document.getElementById('feedback');

  document.querySelectorAll('.opcao').forEach((el, i) => {
    if (i === fase.correta) el.classList.add('correta');
    else if (i === idx && !acertou) el.classList.add('errada');
    else el.classList.add('bloqueada');
  });

  if (acertou) {
    pontos += 100;
    acertos++;
    historico.push({ fase: faseAtual + 1, ok: true });
    fb.className = 'feedback ok';
    fb.textContent = fase.explicacao;
  } else {
    vidas--;
    historico.push({ fase: faseAtual + 1, ok: false });
    atualizarVidas();
    fb.className = 'feedback err';
    fb.textContent = '❌ Errou! A resposta correta era a opção ' + ['A','B','C','D'][fase.correta] + '. ' + fase.explicacao.replace('✅','💡');
    if (document.getElementById('tela-fase')) {
      document.getElementById('tela-fase').style.animation = 'shake 0.4s ease';
      setTimeout(() => { if(document.getElementById('tela-fase')) document.getElementById('tela-fase').style.animation = ''; }, 400);
    }
  }
  fb.style.display = 'block';
  document.getElementById('hud-pontos').textContent = pontos;

  const btnProx = document.getElementById('btn-prox');
  btnProx.style.display = 'block';

  const ultimaFase = faseAtual === FASES.length - 1;
  const semVidas = vidas === 0;

  if (semVidas) {
    btnProx.textContent = '💔 Ver resultado →';
    btnProx.onclick = () => encerrar(false);
  } else if (ultimaFase) {
    btnProx.textContent = '🏆 Ver resultado!';
    btnProx.onclick = () => encerrar(true);
  }
}

function proximaFase() {
  faseAtual++;
  if (faseAtual >= FASES.length || vidas === 0) {
    encerrar(faseAtual >= FASES.length && vidas > 0);
  } else {
    carregarFase();
  }
}

function atualizarVidas() {
  document.querySelectorAll('.vida').forEach((v, i) => {
    v.classList.toggle('perdida', i >= vidas);
  });
}

function encerrar(venceu) {
  document.getElementById('tela-fase').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';
  const pct = Math.round(acertos / FASES.length * 100);
  const primeiro = nomeJogador.split(' ')[0];

  let emoji, titulo, sub;
  if (acertos === FASES.length) { emoji='🏆'; titulo='Perfeito, '+primeiro+'!'; sub='Você acertou todas as 10 fases!'; }
  else if (acertos >= 7) { emoji='🎉'; titulo='Muito bem, '+primeiro+'!'; sub='Excelente desempenho em Cartografia!'; }
  else if (acertos >= 5) { emoji='👍'; titulo='Bom trabalho, '+primeiro+'!'; sub='Continue estudando para melhorar!'; }
  else if (vidas === 0) { emoji='💔'; titulo='Fim de jogo, '+primeiro+'!'; sub='Você perdeu todas as vidas. Tente de novo!'; }
  else { emoji='📚'; titulo='Continue estudando, '+primeiro+'!'; sub='Revise o conteúdo e tente novamente!'; }

  const recapHTML = historico.map(h => `
    <div class="recap-item ${h.ok?'ok':'err'}">
      <span>${h.ok?'✅':'❌'}</span>
      <span>Fase ${h.fase} ${h.ok?'· +100 pts':'· −1 vida'}</span>
    </div>
  `).join('');

  document.getElementById('tela-resultado').style.display = 'block';
  document.getElementById('tela-resultado').innerHTML = `
    <span class="res-emoji">${emoji}</span>
    <div class="res-titulo">${titulo}</div>
    <div class="res-sub">${sub}</div>
    <div class="res-card">
      <div class="stats-grid">
        <div class="stat-box"><span class="stat-val">${acertos}/${FASES.length}</span><span class="stat-lbl">Acertos</span></div>
        <div class="stat-box"><span class="stat-val">${pontos}</span><span class="stat-lbl">Pontos</span></div>
        <div class="stat-box"><span class="stat-val">${pct}%</span><span class="stat-lbl">Aproveitamento</span></div>
        <div class="stat-box"><span class="stat-val">${Math.max(vidas,0)}❤️</span><span class="stat-lbl">Vidas restantes</span></div>
      </div>
      <div class="recap-titulo">Histórico de fases</div>
      <div class="recap-grid">${recapHTML}</div>
    </div>
    <button class="btn-jogar-de-novo" onclick="location.reload()">↩ Jogar de novo</button>
    <p class="enviando-msg" id="enviando-msg">Enviando resultado para a planilha...</p>
  `;

  if (acertos >= 5) confetes();
  enviarResultado(pct);
}

function enviarResultado(pct) {
  const dados = {
    nome: nomeJogador,
    turma: turmaJogador,
    horario: new Date().toLocaleString('pt-BR'),
    acertos: acertos + '/' + FASES.length,
    pontos: pontos,
    aproveitamento: pct + '%',
    vidas_restantes: Math.max(vidas, 0),
    status: vidas === 0 ? 'Game Over' : (acertos === FASES.length ? 'Completo — Perfeito!' : 'Completo')
  };
  fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dados) })
    .then(() => {
      const el = document.getElementById('enviando-msg');
      if (el) el.textContent = '✅ Resultado registrado na planilha!';
    })
    .catch(() => {
      const el = document.getElementById('enviando-msg');
      if (el) el.textContent = '';
    });
}

function confetes() {
  const cores = ['#6366f1','#ec4899','#14b8a6','#f97316','#8b5cf6','#4ade80','#facc15','#3b82f6'];
  for (let i = 0; i < 80; i++) setTimeout(() => {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `left:${Math.random()*100}vw;background:${cores[~~(Math.random()*cores.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*0.8}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5500);
  }, i * 30);
}
</script>
</body>
</html>
