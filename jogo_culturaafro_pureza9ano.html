<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo: Pureza — Escravidão e Resistência</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 3rem}
  .container{max-width:560px;width:100%}
  #tela-inicio{text-align:center;animation:fadeIn 0.5s ease}
  .logo{font-size:64px;display:block;margin-bottom:0.5rem;filter:drop-shadow(0 0 20px rgba(124,58,237,0.5))}
  .game-disc{font-size:11px;font-weight:800;color:#7c3aed;text-transform:uppercase;letter-spacing:2px;margin-bottom:0.4rem}
  .game-title{font-size:26px;font-weight:900;color:white;line-height:1.2;margin-bottom:0.3rem}
  .game-sub{font-size:14px;color:#94a3b8;margin-bottom:1.5rem}
  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
  .info-box{background:#1e293b;border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .info-icon{font-size:22px}
  .info-label{font-size:11px;color:#64748b;font-weight:700}
  .info-val{font-size:18px;font-weight:900;color:white}
  .form-wrap{background:#1e293b;border-radius:18px;padding:20px;margin-bottom:1rem;text-align:left}
  .form-lbl{display:block;font-size:12px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;margin-top:14px}
  .form-lbl:first-child{margin-top:0}
  .form-inp,.form-select{width:100%;padding:12px 14px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color 0.2s;-webkit-appearance:none;appearance:none}
  .form-inp:focus,.form-select:focus{border-color:#7c3aed}
  .form-select option{background:#1e293b}
  .btn-start{width:100%;padding:16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:white;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:16px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,58,237,0.4);margin-top:0.5rem}
  .btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(124,58,237,0.5)}
  #hud{display:none;margin-bottom:1rem}
  .hud-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .hud-fase{font-size:13px;font-weight:800;color:#94a3b8}
  .hud-pontos{font-size:14px;font-weight:900;color:#f59e0b}
  .vidas{display:flex;gap:3px}
  .vida{font-size:18px;transition:all 0.3s}
  .vida.perdida{filter:grayscale(1);opacity:0.3}
  .progress-wrap{height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:3px;transition:width 0.5s ease}
  #tela-fase{display:none}
  #tela-resultado{display:none}
  .fase-badge{display:inline-flex;align-items:center;gap:8px;background:#1e293b;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;color:#64748b;margin-bottom:1rem}
  .fase-num-badge{background:#7c3aed;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
  .pergunta-card{background:#1e293b;border-radius:20px;padding:20px;margin-bottom:1rem;border-top:4px solid var(--cor,#7c3aed)}
  .pergunta-emoji{font-size:40px;display:block;text-align:center;margin-bottom:12px}
  .pergunta-texto{font-size:15px;font-weight:700;color:white;line-height:1.5;text-align:center}
  .opcoes{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
  .opcao{display:flex;align-items:center;gap:12px;background:#1e293b;border:2px solid #334155;border-radius:14px;padding:13px 16px;cursor:pointer;transition:all 0.2s}
  .opcao:hover{border-color:#7c3aed;background:#1a1f35}
  .opcao.correta{border-color:#4ade80;background:#052e16;pointer-events:none}
  .opcao.errada{border-color:#f87171;background:#2d0a0a;pointer-events:none}
  .opcao.bloqueada{opacity:0.4;pointer-events:none}
  .opcao-letra{width:28px;height:28px;border-radius:8px;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#64748b;flex-shrink:0}
  .opcao-texto{font-size:13px;font-weight:700;color:#e2e8f0;line-height:1.4}
  .feedback{display:none;padding:12px 16px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.5;margin-bottom:1rem}
  .feedback.ok{background:#052e16;color:#4ade80;border:1px solid #166534}
  .feedback.err{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d}
  .btn-prox{display:none;width:100%;padding:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:14px;cursor:pointer;transition:all 0.2s}
  .btn-prox:hover{opacity:0.9}
  .res-emoji{font-size:70px;display:block;text-align:center;margin-bottom:0.5rem}
  .res-titulo{font-size:24px;font-weight:900;color:white;text-align:center;margin-bottom:0.4rem}
  .res-sub{font-size:14px;color:#94a3b8;text-align:center;margin-bottom:1.5rem}
  .res-card{background:#1e293b;border-radius:20px;padding:20px;margin-bottom:1rem}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
  .stat-box{background:#0f172a;border-radius:14px;padding:12px 6px;text-align:center}
  .stat-val{font-size:30px;font-weight:900;color:white;display:block}
  .stat-lbl{font-size:12px;color:#64748b;display:block;margin-top:2px}
  .recap-titulo{font-size:12px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;text-align:left}
  .recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .recap-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;font-size:13px;font-weight:700}
  .recap-item.ok{background:#052e16;color:#4ade80}
  .recap-item.err{background:#2d0a0a;color:#f87171}
  .btn-jogar-de-novo{width:100%;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#94a3b8;background:#1e293b;border:2px solid #334155;border-radius:14px;cursor:pointer;transition:all 0.2s;margin-top:0.5rem}
  .btn-jogar-de-novo:hover{border-color:#7c3aed;color:white}
  .enviando-msg{font-size:13px;color:#64748b;margin-top:10px;text-align:center}
  .confetti-piece{position:fixed;top:-10px;pointer-events:none;animation:confettiFall linear forwards}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(0.9)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="container">
  <div id="tela-inicio">
    <span class="logo">✊</span>
    <div class="game-disc">Cultura Afro-Brasileira · 9º Ano</div>
    <div class="game-title">Pureza — Escravidão e Resistência</div>
    <div class="game-sub">10 fases · Memória, luta e direitos no Brasil</div>
    <div class="info-grid">
      <div class="info-box"><span class="info-icon">🎯</span><span class="info-label">Fases</span><span class="info-val">10</span></div>
      <div class="info-box"><span class="info-icon">❤️</span><span class="info-label">Vidas</span><span class="info-val">5</span></div>
      <div class="info-box"><span class="info-icon">⭐</span><span class="info-label">Pontos</span><span class="info-val">até 1000</span></div>
    </div>
    <div class="form-wrap">
      <span class="form-lbl">👤 Seu nome completo</span>
      <input class="form-inp" id="nome" type="text" placeholder="Digite seu nome...">
      <span class="form-lbl">🏫 Sua turma</span>
      <select class="form-select" id="turma">
        <option value="">— Selecione sua turma —</option>
        <option value="9º A">9º A</option>
        <option value="9º B">9º B</option>
        <option value="9º C">9º C</option>
        <option value="9º D">9º D</option>
        <option value="9º E">9º E</option>
      </select>
    </div>
    <button class="btn-start" onclick="iniciar()">🚀 Começar o jogo!</button>
  </div>
  <div id="hud">
    <div class="hud-row">
      <div class="hud-fase">Fase <span id="hud-fase-num">1</span>/10</div>
      <div class="hud-pontos">⭐ <span id="hud-pontos">0</span> pts</div>
      <div class="vidas" id="vidas-display">
        <span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="tela-fase"></div>
  <div id="tela-resultado"></div>
</div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbydyp0t_TVhzz-ZJRoeO47qBccV7hDekbmUP1PFLoVpPtBiiGLwXFtSEKzzfYBklJ54/exec";
const FASES=[
  {
    cor:'#7c3aed',
    emoji:'🎬',
    pergunta:'Quem é a protagonista do filme <em>Pureza</em> (2019), baseado em uma história real?',
    opcoes:['Elenice, servidora do Ministério do Trabalho','Pureza Lopes Loyola, mulher nordestina do Maranhão','Maria das Dores, trabalhadora rural do Pará','Ana Loyola, ativista da Comissão Pastoral da Terra'],
    correta:1,
    explicacao:'✅ Pureza Lopes Loyola é a protagonista. Ela parte do Maranhão em busca de seu filho Abel, desaparecido após ir trabalhar no garimpo da Amazônia.'
  },
  {
    cor:'#a855f7',
    emoji:'📅',
    pergunta:'Entre quais anos se passa a trama do filme <em>Pureza</em>?',
    opcoes:['1983 e 1985','1988 e 1990','1993 e 1995','2003 e 2005'],
    correta:2,
    explicacao:'✅ A trama se passa entre 1993 e 1995, e foi filmada na cidade de Marabá, no Pará.'
  },
  {
    cor:'#6366f1',
    emoji:'🕵️',
    pergunta:'No contexto do trabalho análogo à escravidão, o que é o "gato"?',
    opcoes:['Um jagunço armado que vigia e agride os trabalhadores','O aliciador que convence trabalhadores pobres com falsas promessas de bom salário','Um fiscal do Ministério do Trabalho que investiga fazendas','Um trabalhador experiente que orienta os recém-chegados'],
    correta:1,
    explicacao:'✅ O "gato" é o aliciador. Ele aborda trabalhadores em praças públicas com belas promessas, mas ao chegarem na fazenda a realidade é completamente diferente.'
  },
  {
    cor:'#ec4899',
    emoji:'⛓️',
    pergunta:'O que é a "servidão por dívida"?',
    opcoes:['Um empréstimo governamental dado ao trabalhador antes do início do trabalho','O mecanismo pelo qual o fazendeiro cobra itens básicos com preços inflados, criando uma dívida impossível de pagar','Um contrato assinado em que o salário quita dívidas anteriores do trabalhador','Uma multa aplicada ao trabalhador que tenta abandonar o serviço antes do prazo'],
    correta:1,
    explicacao:'✅ Na servidão por dívida, transporte, alimentação, ferramentas e alojamento são cobrados com valores superfaturados. A dívida cresce mais rápido do que qualquer salário poderia pagar.'
  },
  {
    cor:'#14b8a6',
    emoji:'📜',
    pergunta:'Em que ano foi assinada a Lei Áurea, que declarou formalmente o fim da escravidão no Brasil?',
    opcoes:['1850','1871','1888','1900'],
    correta:2,
    explicacao:'✅ A Lei Áurea foi assinada em 1888. O Brasil foi o último país das Américas a abolir a escravidão — depois de 388 anos de escravização de pessoas africanas e seus descendentes.'
  },
  {
    cor:'#f97316',
    emoji:'📊',
    pergunta:'Entre 2016 e 2018, qual era a porcentagem de trabalhadores resgatados em situação análoga à escravidão que eram negros?',
    opcoes:['50%','65%','75%','82%'],
    correta:3,
    explicacao:'✅ 82% dos trabalhadores resgatados eram negros — dado que demonstra que a escravidão contemporânea tem cor, classe e endereço, sendo a continuação de uma injustiça histórica nunca reparada.'
  },
  {
    cor:'#8b5cf6',
    emoji:'🔍',
    pergunta:'Como é chamado o mecanismo criado em 1995 para resgatar trabalhadores em situação de escravidão em regiões remotas do Brasil?',
    opcoes:['Comissão Pastoral da Terra','Grupo Especial de Fiscalização Móvel','Cadastro Nacional de Trabalho Rural','Brigada Federal de Combate à Escravidão'],
    correta:1,
    explicacao:'✅ O Grupo Especial de Fiscalização Móvel foi criado 107 anos após a Lei Áurea. Desde sua criação até 2022, mais de 60 mil trabalhadores foram resgatados.'
  },
  {
    cor:'#3b82f6',
    emoji:'📋',
    pergunta:'O que é a "lista suja" no combate ao trabalho escravo?',
    opcoes:['Uma relação de trabalhadores que tentaram fugir das fazendas','Um cadastro de denúncias anônimas feitas ao Ministério do Trabalho','Um banco de dados público com os nomes de empregadores flagrados com trabalho escravo, impedindo que obtenham financiamentos','Uma lista de fazendas interditadas pela Justiça Federal'],
    correta:2,
    explicacao:'✅ O Cadastro de Empregadores, chamado de "lista suja", é um banco de dados público que constrange e prejudica economicamente os flagrados com trabalho escravo, dificultando acesso a crédito governamental.'
  },
  {
    cor:'#10b981',
    emoji:'⚖️',
    pergunta:'Qual foi o principal problema com a Lei Áurea de 1888?',
    opcoes:['Ela foi rejeitada pela maioria dos estados brasileiros e não teve efeito prático','Ela libertou formalmente as pessoas escravizadas, mas não garantiu reparação, moradia, emprego nem educação à população negra','Ela permitiu que os escravizadores continuassem pagando pelos escravos por mais dez anos','Ela foi assinada antes da época certa, gerando grave crise econômica no país'],
    correta:1,
    explicacao:'✅ Com poucas linhas, a Lei Áurea apenas declarou o fim formal da escravidão, sem garantir qualquer estrutura de reparação. A população negra foi libertada e, ao mesmo tempo, abandonada à própria sorte.'
  },
  {
    cor:'#e11d48',
    emoji:'✊',
    pergunta:'Quantos trabalhadores foram resgatados em situação análoga à escravidão no Brasil no ano de 2022?',
    opcoes:['502 trabalhadores','1.200 trabalhadores','2.575 trabalhadores','5.000 trabalhadores'],
    correta:2,
    explicacao:'✅ Em 2022, foram resgatados 2.575 trabalhadores — prova de que a escravidão contemporânea continua existindo e que a luta de Pureza ainda não acabou.'
  }
];
const TOTAL=FASES.length;
let nomeJogador='',turmaJogador='',faseAtual=0,vidas=5,pontos=0,acertos=0,historico=[],respondeu=false;
function iniciar(){nomeJogador=document.getElementById('nome').value.trim();turmaJogador=document.getElementById('turma').value;if(!nomeJogador){document.getElementById('nome').style.borderColor='#f87171';setTimeout(()=>document.getElementById('nome').style.borderColor='#334155',1500);return;}if(!turmaJogador){document.getElementById('turma').style.borderColor='#f87171';setTimeout(()=>document.getElementById('turma').style.borderColor='#334155',1500);return;}document.getElementById('tela-inicio').style.display='none';document.getElementById('hud').style.display='block';carregarFase();}
function carregarFase(){respondeu=false;const fase=FASES[faseAtual];document.getElementById('hud-fase-num').textContent=faseAtual+1;document.getElementById('hud-pontos').textContent=pontos;document.getElementById('progress-fill').style.width=(faseAtual/TOTAL*100)+'%';atualizarVidas();const opHTML=fase.opcoes.map((op,i)=>`<div class="opcao" onclick="responder(${i})" id="op-${i}"><div class="opcao-letra">${['A','B','C','D'][i]}</div><div class="opcao-texto">${op}</div></div>`).join('');document.getElementById('tela-fase').style.display='block';document.getElementById('tela-fase').innerHTML=`<div style="animation:fadeUp 0.4s ease"><div class="fase-badge"><div class="fase-num-badge">${faseAtual+1}</div>Fase ${faseAtual+1} de ${TOTAL}</div><div class="pergunta-card" style="--cor:${fase.cor}"><span class="pergunta-emoji">${fase.emoji}</span><div class="pergunta-texto">${fase.pergunta}</div></div><div class="opcoes">${opHTML}</div><div class="feedback" id="feedback"></div><button class="btn-prox" id="btn-prox" onclick="proximaFase()">Próxima fase →</button></div>`;}
function responder(idx){if(respondeu)return;respondeu=true;const fase=FASES[faseAtual];const acertou=idx===fase.correta;const fb=document.getElementById('feedback');document.querySelectorAll('.opcao').forEach((el,i)=>{if(i===fase.correta)el.classList.add('correta');else if(i===idx&&!acertou)el.classList.add('errada');else el.classList.add('bloqueada');});if(acertou){pontos+=100;acertos++;historico.push({fase:faseAtual+1,ok:true});fb.className='feedback ok';fb.textContent=fase.explicacao;}else{vidas--;historico.push({fase:faseAtual+1,ok:false});atualizarVidas();fb.className='feedback err';fb.textContent='❌ Errou! A resposta correta era a opção '+['A','B','C','D'][fase.correta]+'. '+fase.explicacao.replace('✅','💡');if(document.getElementById('tela-fase')){document.getElementById('tela-fase').style.animation='shake 0.4s ease';setTimeout(()=>{if(document.getElementById('tela-fase'))document.getElementById('tela-fase').style.animation='';},400);}}fb.style.display='block';document.getElementById('hud-pontos').textContent=pontos;const btn=document.getElementById('btn-prox');btn.style.display='block';if(vidas===0){btn.textContent='💔 Ver resultado →';btn.onclick=()=>encerrar(false);}else if(faseAtual===TOTAL-1){btn.textContent='🏆 Ver resultado!';btn.onclick=()=>encerrar(true);}}
function proximaFase(){faseAtual++;if(faseAtual>=TOTAL||vidas===0)encerrar(faseAtual>=TOTAL&&vidas>0);else carregarFase();}
function atualizarVidas(){document.querySelectorAll('.vida').forEach((v,i)=>v.classList.toggle('perdida',i>=vidas));}
function encerrar(venceu){document.getElementById('tela-fase').style.display='none';document.getElementById('progress-fill').style.width='100%';const pct=Math.round(acertos/TOTAL*100);const primeiro=nomeJogador.split(' ')[0];let emoji,titulo,sub;if(acertos===TOTAL){emoji='🏆';titulo='Perfeito, '+primeiro+'!';sub='Você acertou todas as fases!';}else if(acertos>=Math.ceil(TOTAL*0.7)){emoji='🎉';titulo='Muito bem, '+primeiro+'!';sub='Ótimo desempenho!';}else if(acertos>=Math.ceil(TOTAL*0.5)){emoji='👍';titulo='Bom trabalho, '+primeiro+'!';sub='Continue estudando!';}else if(vidas===0){emoji='💔';titulo='Fim de jogo, '+primeiro+'!';sub='Perdeu todas as vidas. Tente de novo!';}else{emoji='📚';titulo='Continue estudando, '+primeiro+'!';sub='Revise o conteúdo e tente novamente!';}const recapHTML=historico.map(h=>`<div class="recap-item ${h.ok?'ok':'err'}"><span>${h.ok?'✅':'❌'}</span><span>Fase ${h.fase} ${h.ok?'· +100 pts':'· −1 vida'}</span></div>`).join('');document.getElementById('tela-resultado').style.display='block';document.getElementById('tela-resultado').innerHTML=`<span class="res-emoji">${emoji}</span><div class="res-titulo">${titulo}</div><div class="res-sub">${sub}</div><div class="res-card"><div class="stats-grid"><div class="stat-box"><span class="stat-val">${acertos}/${TOTAL}</span><span class="stat-lbl">Acertos</span></div><div class="stat-box"><span class="stat-val">${pontos}</span><span class="stat-lbl">Pontos</span></div><div class="stat-box"><span class="stat-val">${pct}%</span><span class="stat-lbl">Aproveitamento</span></div><div class="stat-box"><span class="stat-val">${Math.max(vidas,0)}❤️</span><span class="stat-lbl">Vidas</span></div></div><div class="recap-titulo">Histórico de fases</div><div class="recap-grid">${recapHTML}</div></div><button class="btn-jogar-de-novo" onclick="location.reload()">↩ Jogar de novo</button><p class="enviando-msg" id="enviando-msg">Enviando resultado para a planilha...</p>`;if(acertos>=Math.ceil(TOTAL*0.5))confetes();enviarResultado(pct);}
function enviarResultado(pct){const dados={nome:nomeJogador,turma:turmaJogador,horario:new Date().toLocaleString('pt-BR'),acertos:acertos+'/'+TOTAL,pontos,aproveitamento:pct+'%',vidas_restantes:Math.max(vidas,0),status:vidas===0?'Game Over':(acertos===TOTAL?'Completo — Perfeito!':'Completo')};fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(dados)}).then(()=>{const el=document.getElementById('enviando-msg');if(el)el.textContent='✅ Resultado registrado na planilha!';}).catch(()=>{const el=document.getElementById('enviando-msg');if(el)el.textContent='';});}
function confetes(){const cores=['#7c3aed','#a855f7','#ec4899','#f97316','#8b5cf6','#4ade80','#facc15','#3b82f6'];for(let i=0;i<80;i++)setTimeout(()=>{const c=document.createElement('div');c.className='confetti-piece';c.style.cssText=`left:${Math.random()*100}vw;background:${cores[~~(Math.random()*cores.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*0.8}s;border-radius:${Math.random()>.5?'50%':'2px'};`;document.body.appendChild(c);setTimeout(()=>c.remove(),5500);},i*30);}
</script>
