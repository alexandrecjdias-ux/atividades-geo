<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo de Geografia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1.5rem 1rem 3rem; }
  .container { max-width: 560px; width: 100%; }

  /* TELA DE INÍCIO */
  #tela-inicio { text-align: center; animation: fadeIn 0.5s ease; }
  .logo { font-size: 72px; margin-bottom: 12px; display: block; }
  .game-title { font-size: 28px; font-weight: 900; color: white; margin-bottom: 6px; }
  .game-sub { font-size: 15px; color: #94a3b8; margin-bottom: 2rem; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .info-box { background: #1e293b; border-radius: 14px; padding: 14px 10px; text-align: center; }
  .info-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .info-label { font-size: 12px; color: #64748b; display: block; }
  .info-val { font-size: 14px; font-weight: 800; color: white; display: block; margin-top: 2px; }
  .nome-wrap { background: #1e293b; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
  .nome-lbl { font-size: 13px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
  .nome-inp { width: 100%; padding: 12px 14px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: white; outline: none; transition: border 0.2s; }
  .nome-inp::placeholder { color: #475569; }
  .nome-inp:focus { border-color: #6366f1; }
  .btn-start { width: 100%; padding: 16px; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: white; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 24px rgba(99,102,241,0.5); letter-spacing: 0.3px; }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(99,102,241,0.6); }

  /* HUD */
  #hud { display: none; background: #1e293b; border-radius: 16px; padding: 12px 16px; margin-bottom: 1rem; }
  .hud-row { display: flex; align-items: center; justify-content: space-between; }
  .hud-fase { font-size: 13px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .hud-fase span { color: white; }
  .vidas { display: flex; gap: 6px; }
  .vida { font-size: 22px; transition: all 0.3s; }
  .vida.perdida { filter: grayscale(1); opacity: 0.3; transform: scale(0.85); }
  .progress-wrap { margin-top: 10px; background: #0f172a; border-radius: 20px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 20px; transition: width 0.5s ease; }

  /* TELA DE FASE */
  #tela-fase { display: none; }
  .fase-badge { display: inline-flex; align-items: center; gap: 6px; background: #1e293b; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 800; color: #a78bfa; margin-bottom: 14px; }
  .fase-badge .fase-num { background: #6366f1; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .pergunta-card { background: #1e293b; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; border-top: 4px solid var(--cor); }
  .pergunta-emoji { font-size: 36px; display: block; margin-bottom: 10px; }
  .pergunta-texto { font-size: 16px; font-weight: 800; color: white; line-height: 1.5; }
  .opcoes { display: flex; flex-direction: column; gap: 10px; }
  .opcao { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #1e293b; border: 2px solid #334155; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
  .opcao:hover { border-color: #6366f1; background: #1e293b; transform: translateX(4px); }
  .opcao-letra { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; background: #0f172a; color: #64748b; flex-shrink: 0; transition: all 0.2s; }
  .opcao-texto { font-size: 14px; font-weight: 700; color: #cbd5e1; line-height: 1.4; }
  .opcao.correta { border-color: #4ade80 !important; background: #052e16 !important; pointer-events: none; }
  .opcao.correta .opcao-letra { background: #4ade80; color: #052e16; }
  .opcao.correta .opcao-texto { color: #4ade80; }
  .opcao.errada { border-color: #f87171 !important; background: #2d0a0a !important; pointer-events: none; }
  .opcao.errada .opcao-letra { background: #f87171; color: #2d0a0a; }
  .opcao.errada .opcao-texto { color: #f87171; }
  .opcao.bloqueada { pointer-events: none; opacity: 0.4; }

  /* FEEDBACK */
  .feedback { border-radius: 14px; padding: 14px 16px; margin-top: 10px; font-size: 15px; font-weight: 800; display: none; animation: fadeIn 0.3s ease; }
  .feedback.ok { background: #052e16; color: #4ade80; border: 2px solid #166534; }
  .feedback.err { background: #2d0a0a; color: #f87171; border: 2px solid #991b1b; }
  .btn-prox { width: 100%; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: white; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s; margin-top: 12px; display: none; box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
  .btn-prox:hover { transform: translateY(-2px); }

  /* TELA DE RESULTADO */
  #tela-resultado { display: none; animation: fadeIn 0.5s ease; text-align: center; }
  .res-emoji { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 0.8s ease; }
  .res-titulo { font-size: 26px; font-weight: 900; color: white; margin-bottom: 6px; }
  .res-sub { font-size: 14px; color: #94a3b8; margin-bottom: 1.5rem; }
  .res-card { background: #1e293b; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .stat-box { background: #0f172a; border-radius: 14px; padding: 14px; }
  .stat-val { font-size: 32px; font-weight: 900; color: white; display: block; }
  .stat-lbl { font-size: 12px; color: #64748b; display: block; margin-top: 2px; }
  .fase-recap { text-align: left; }
  .recap-titulo { font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .recap-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; font-weight: 700; }
  .recap-item.ok { background: #052e16; color: #4ade80; }
  .recap-item.err { background: #2d0a0a; color: #f87171; }
  .btn-jogar-de-novo { width: 100%; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: #94a3b8; background: #1e293b; border: 2px solid #334155; border-radius: 14px; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
  .btn-jogar-de-novo:hover { border-color: #6366f1; color: white; }

  /* ANIMAÇÕES */
  @keyframes fadeIn { from{opacity:0}to{opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%,100%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(0.9)} }
  @keyframes shake { 0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)} }
  @keyframes pulseVerde { 0%{box-shadow:0 0 0 0 rgba(74,222,128,0.4)}100%{box-shadow:0 0 0 12px rgba(74,222,128,0)} }
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  .confetti-piece { position: fixed; top: -10px; pointer-events: none; animation: confettiFall linear forwards; }
</style>
</head>
<body>
<div class="container">

  <!-- TELA INÍCIO -->
  <div id="tela-inicio">
    <span class="logo">🌍</span>
    <div class="game-title">GeoAventura</div>
    <div class="game-sub">Teste seus conhecimentos de Geografia!</div>
    <div class="info-grid">
      <div class="info-box"><span class="info-icon">🎯</span><span class="info-label">Fases</span><span class="info-val">5</span></div>
      <div class="info-box"><span class="info-icon">❤️</span><span class="info-label">Vidas</span><span class="info-val">3</span></div>
      <div class="info-box"><span class="info-icon">⭐</span><span class="info-label">Pontos</span><span class="info-val">até 500</span></div>
    </div>
    <div class="nome-wrap">
      <span class="nome-lbl">👤 Seu nome completo</span>
      <input class="nome-inp" id="nome" type="text" placeholder="Digite seu nome para começar...">
    </div>
    <button class="btn-start" onclick="iniciar()">🚀 Começar o jogo!</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="hud-fase">Fase <span id="hud-fase-num">1</span> de 5</div>
      <div class="vidas" id="vidas-display">
        <span class="vida">❤️</span><span class="vida">❤️</span><span class="vida">❤️</span>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- TELA FASE -->
  <div id="tela-fase"></div>

  <!-- TELA RESULTADO -->
  <div id="tela-resultado"></div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyiCArjavmt278IUUFuk_QNt81qeqQU_hcDOeY2i3iX301gTBL7jEYV0NZjVFwDZYIPkQ/exec";

const FASES = [
  {
    cor: '#6366f1',
    emoji: '🗺️',
    pergunta: 'O que são coordenadas geográficas?',
    opcoes: [
      'Linhas que dividem o mapa em países',
      'Sistema de paralelos e meridianos que localiza qualquer ponto na Terra',
      'Símbolos usados para identificar cidades num mapa',
      'Escala que indica distância entre dois pontos'
    ],
    correta: 1,
    explicacao: '✅ Isso mesmo! Coordenadas geográficas são formadas por paralelos (latitude) e meridianos (longitude).'
  },
  {
    cor: '#ec4899',
    emoji: '🌐',
    pergunta: 'Qual linha divide a Terra em Hemisfério Norte e Hemisfério Sul?',
    opcoes: [
      'Meridiano de Greenwich',
      'Trópico de Capricórnio',
      'Equador',
      'Círculo Polar Ártico'
    ],
    correta: 2,
    explicacao: '✅ Correto! O Equador é o paralelo de 0° que divide a Terra ao meio.'
  },
  {
    cor: '#14b8a6',
    emoji: '🇧🇷',
    pergunta: 'O Brasil está localizado predominantemente em qual hemisfério?',
    opcoes: [
      'Hemisfério Norte e Leste',
      'Hemisfério Sul e Oeste',
      'Hemisfério Norte e Oeste',
      'Hemisfério Sul e Leste'
    ],
    correta: 1,
    explicacao: '✅ Exato! A maior parte do Brasil fica no Hemisfério Sul e no Hemisfério Oeste.'
  },
  {
    cor: '#f97316',
    emoji: '📏',
    pergunta: 'O que a latitude indica sobre um lugar?',
    opcoes: [
      'A distância em relação ao Meridiano de Greenwich',
      'A altitude em relação ao nível do mar',
      'A distância em relação ao Equador, em graus norte ou sul',
      'A velocidade de rotação da Terra naquele ponto'
    ],
    correta: 2,
    explicacao: '✅ Muito bem! A latitude mede a distância de um ponto em relação ao Equador.'
  },
  {
    cor: '#8b5cf6',
    emoji: '🗾',
    pergunta: 'Qual é a principal função de um mapa?',
    opcoes: [
      'Decorar ambientes e salas de aula',
      'Mostrar apenas a divisão política entre países',
      'Registrar a história das civilizações',
      'Representar a superfície da Terra, permitindo localização e estudo dos espaços geográficos'
    ],
    correta: 3,
    explicacao: '✅ Perfeito! Mapas são ferramentas fundamentais para representar e compreender o espaço geográfico.'
  }
];

const LETRAS = ['A', 'B', 'C', 'D'];
let nomeJogador = '';
let faseAtual = 0;
let vidas = 3;
let pontos = 0;
let acertos = 0;
let historico = [];
let respondeu = false;

function iniciar() {
  nomeJogador = document.getElementById('nome').value.trim();
  if (!nomeJogador) {
    document.getElementById('nome').style.borderColor = '#f87171';
    setTimeout(() => document.getElementById('nome').style.borderColor = '#334155', 1500);
    return;
  }
  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  carregarFase();
}

function carregarFase() {
  respondeu = false;
  const fase = FASES[faseAtual];
  document.getElementById('hud-fase-num').textContent = faseAtual + 1;
  document.getElementById('progress-fill').style.width = (faseAtual / FASES.length * 100) + '%';
  atualizarVidas();

  const letras = ['A','B','C','D'];
  let opcoesHTML = fase.opcoes.map((op, i) => `
    <div class="opcao" onclick="responder(${i})" id="op-${i}">
      <div class="opcao-letra">${letras[i]}</div>
      <div class="opcao-texto">${op}</div>
    </div>
  `).join('');

  document.getElementById('tela-fase').style.display = 'block';
  document.getElementById('tela-fase').innerHTML = `
    <div style="animation: fadeUp 0.4s ease">
      <div class="fase-badge">
        <div class="fase-num">${faseAtual + 1}</div>
        Fase ${faseAtual + 1}
      </div>
      <div class="pergunta-card" style="--cor:${fase.cor}">
        <span class="pergunta-emoji">${fase.emoji}</span>
        <div class="pergunta-texto">${fase.pergunta}</div>
      </div>
      <div class="opcoes">${opcoesHTML}</div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-prox" id="btn-prox" onclick="proximaFase()">Próxima fase →</button>
    </div>
  `;
}

function responder(idx) {
  if (respondeu) return;
  respondeu = true;
  const fase = FASES[faseAtual];
  const acertou = idx === fase.correta;
  const fb = document.getElementById('feedback');

  document.querySelectorAll('.opcao').forEach((el, i) => {
    if (i === fase.correta) el.classList.add('correta');
    else if (i === idx && !acertou) el.classList.add('errada');
    else el.classList.add('bloqueada');
  });

  if (acertou) {
    const pts = Math.max(100 - (0), 100);
    pontos += pts;
    acertos++;
    historico.push({ fase: faseAtual + 1, ok: true });
    fb.className = 'feedback ok';
    fb.textContent = fase.explicacao;
    fb.style.display = 'block';
  } else {
    vidas--;
    historico.push({ fase: faseAtual + 1, ok: false });
    atualizarVidas();
    fb.className = 'feedback err';
    fb.textContent = '❌ Errou! A resposta correta era a opção ' + LETRAS[fase.correta] + '.';
    fb.style.display = 'block';
    document.getElementById('tela-fase').style.animation = 'shake 0.4s ease';
    setTimeout(() => document.getElementById('tela-fase').style.animation = '', 400);
  }

  document.getElementById('btn-prox').style.display = 'block';

  if (vidas === 0) {
    document.getElementById('btn-prox').textContent = 'Ver resultado →';
    document.getElementById('btn-prox').onclick = () => encerrar(false);
  } else if (faseAtual === FASES.length - 1) {
    document.getElementById('btn-prox').textContent = '🏆 Ver resultado!';
    document.getElementById('btn-prox').onclick = () => encerrar(true);
  }
}

function proximaFase() {
  faseAtual++;
  if (faseAtual >= FASES.length || vidas === 0) {
    encerrar(faseAtual >= FASES.length && vidas > 0);
  } else {
    carregarFase();
  }
}

function atualizarVidas() {
  const divs = document.querySelectorAll('.vida');
  divs.forEach((v, i) => {
    v.classList.toggle('perdida', i >= vidas);
  });
}

function encerrar(venceu) {
  document.getElementById('tela-fase').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';

  const pct = Math.round(acertos / FASES.length * 100);
  let emoji, titulo, sub;
  if (venceu && acertos === FASES.length) { emoji = '🏆'; titulo = 'Perfeito, ' + nomeJogador.split(' ')[0] + '!'; sub = 'Você completou todas as fases sem errar!'; }
  else if (acertos >= 3) { emoji = '🎉'; titulo = 'Muito bem, ' + nomeJogador.split(' ')[0] + '!'; sub = 'Ótimo desempenho no GeoAventura!'; }
  else if (vidas === 0) { emoji = '💔'; titulo = 'Fim de jogo, ' + nomeJogador.split(' ')[0] + '!'; sub = 'Você usou todas as vidas. Tente novamente!'; }
  else { emoji = '📚'; titulo = 'Continue estudando, ' + nomeJogador.split(' ')[0] + '!'; sub = 'Você pode melhorar — tente de novo!'; }

  const recapHTML = historico.map(h => `
    <div class="recap-item ${h.ok ? 'ok' : 'err'}">
      <span>${h.ok ? '✅' : '❌'}</span>
      <span>Fase ${h.fase}</span>
      <span style="margin-left:auto;font-size:12px">${h.ok ? '+100 pts' : '−1 vida'}</span>
    </div>
  `).join('');

  document.getElementById('tela-resultado').style.display = 'block';
  document.getElementById('tela-resultado').innerHTML = `
    <span class="res-emoji">${emoji}</span>
    <div class="res-titulo">${titulo}</div>
    <div class="res-sub">${sub}</div>
    <div class="res-card">
      <div class="stats-grid">
        <div class="stat-box"><span class="stat-val">${acertos}/${FASES.length}</span><span class="stat-lbl">Acertos</span></div>
        <div class="stat-box"><span class="stat-val">${pontos}</span><span class="stat-lbl">Pontos</span></div>
        <div class="stat-box"><span class="stat-val">${pct}%</span><span class="stat-lbl">Aproveitamento</span></div>
        <div class="stat-box"><span class="stat-val">${vidas > 0 ? vidas : 0}❤️</span><span class="stat-lbl">Vidas restantes</span></div>
      </div>
      <div class="fase-recap">
        <div class="recap-titulo">Histórico de fases</div>
        ${recapHTML}
      </div>
    </div>
    <button class="btn-jogar-de-novo" onclick="location.reload()">↩ Jogar de novo</button>
  `;

  if (acertos >= 3) confetes();
  enviarResultado(venceu, pct);
}

function enviarResultado(venceu, pct) {
  const dados = {
    nome: nomeJogador,
    horario: new Date().toLocaleString('pt-BR'),
    acertos: acertos + '/' + FASES.length,
    pontos,
    aproveitamento: pct + '%',
    vidas_restantes: vidas > 0 ? vidas : 0,
    status: venceu ? 'Completou' : (vidas === 0 ? 'Game Over' : 'Parcial')
  };
  fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dados) }).catch(() => {});
}

function confetes() {
  const cores = ['#6366f1','#ec4899','#14b8a6','#f97316','#8b5cf6','#4ade80','#facc15'];
  for (let i = 0; i < 70; i++) setTimeout(() => {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `left:${Math.random()*100}vw;background:${cores[~~(Math.random()*cores.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }, i * 35);
}
</script>
</body>
</html>
